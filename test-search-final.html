<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Search Final - Off-Grid Estate NZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-left">
                <a href="index.html" class="logo">Off-Grid Estate NZ</a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h2>Discover Your Off-Grid Freedom</h2>
            <p class="hero-subtitle">Escape to sustainable living where luxury meets nature.</p>
            <div class="search-bar hero-search">
                <input type="text" id="hero-search-input" placeholder="Search for your dream off-grid location...">
                <button class="filter-button" id="hero-filter-button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="22,3 2,3 10,12.46 10,19 14,21 14,12.46"></polygon>
                    </svg>
                    Advanced Filters
                </button>
                <button id="hero-search-button">Find My Sanctuary</button>
            </div>
        </div>
    </section>

    <!-- Property Listings Section -->
    <section class="property-listings-section">
        <div class="container">
            <div class="listings-header">
                <h2>Premium Off-Grid Properties</h2>
                <p class="section-subtitle">Handpicked sustainable living opportunities across New Zealand's most pristine locations.</p>
            </div>
            
            <div class="property-grid" id="property-grid">
                <!-- Property cards will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <script src="script-working.js"></script>
</body>
</html>
